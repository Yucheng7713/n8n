version: '3.8'

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    mem_limit: 80m
    mem_reservation: 40m
    cpus: 0.15

  n8n:
    image: n8nio/n8n:stable
    restart: unless-stopped
    env_file:
      - .env 
    expose:
      - "${N8N_PORT}"
    environment:
      # Basic
      - N8N_HOST=${N8N_EXTERNAL_HOST}
      - N8N_PORT=${N8N_PORT}
      - N8N_PROTOCOL=https
      - GENERIC_TIMEZONE=${TIMEZONE}

      # Auth
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_ADMIN_USERNAME}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_ADMIN_PASSWORD}

      # Webhook
      - WEBHOOK_URL=https://${N8N_EXTERNAL_HOST}/

      # AI Agent optimization
      - EXECUTIONS_PROCESS=main
      - EXECUTIONS_TIMEOUT=300              # Set timeout to 5 min 
      - EXECUTIONS_TIMEOUT_MAX=600          # Set max timeout to 10 min
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=24          # Only keep data within 1-day for saving storage.
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=none
      - EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS=false
      
      # Allow $env and process.env access in nodes/expressions
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false

      # 嚴格限制
      - N8N_PAYLOAD_SIZE_MAX=8              # Reduce to 8MB
      - N8N_METRICS=false
      - N8N_DIAGNOSTICS_ENABLED=false
      - NODE_OPTIONS=--max-old-space-size=320
      
      # Simultaneous control
      - EXECUTIONS_CONCURRENCY_MAX=2        # At most 2 running workflows
      
      # Logging
      - N8N_LOG_LEVEL=error                 # Only keep error log
      - N8N_LOG_OUTPUT=console
      - N8N_USER_MANAGEMENT_DISABLED=true

      # Queue mode (Redis)
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - EXECUTIONS_MODE=regular

    volumes:
      - ~/n8n-data:/home/node/.n8n
    depends_on:
      redis:
        condition: service_healthy
    mem_limit: 450m
    mem_reservation: 250m
    cpus: 1.2
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 120mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
      --tcp-backlog 511
      --timeout 300
      --tcp-keepalive 60
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    mem_limit: 140m
    mem_reservation: 80m
    cpus: 0.3
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  n8n-data:
  caddy_data:
  caddy_config:
  redis_data: